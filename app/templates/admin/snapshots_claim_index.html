{% extends "layouts/admin_base.html" %}
<!DOCTYPE html>
<html>
<head>
<title>Snapshots por Claim</title>
<style>
body { font-family: monospace; padding:20px }
table { border-collapse: collapse; width:100% }
th,td { border:1px solid #ccc; padding:6px }
th { background:#eee }
</style>
</head>
<body>

<h2>Snapshots del Claim {{ claim_id }}</h2>

<table>
<thead>
<tr>
<th>Version</th>
<th>Snapshot ID</th>
<th>Created</th>
<th>Hash</th>
<th>Ver</th>
</tr>
</thead>

<tbody>

{% for s in snapshots %}
<tr>
<td>{{ s.version_number }}</td>
<td>{{ s.snapshot_id }}</td>
<td>{{ s.created_at }}</td>
<td>{{ s.snapshot_hash }}</td>
<td>
<a href="/admin/snapshots/{{ s.snapshot_id }}">abrir</a>
</td>
</tr>
{% endfor %}

</tbody>
</table>

</body>
</html>
