{% extends "layouts/admin_base.html" %}

{% block content %}

<h1>Encounters</h1>

<table>

<thead>
<tr>
<th>Date</th>
<th>Patient</th>
<th>Status</th>
</tr>
</thead>

<tbody>

{% for e in encounters %}

<tr>
<td>{{ e.encounter_date }}</td>
<td>{{ e.first_name }} {{ e.last_name }}</td>
<td>{{ e.status }}</td>
</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
