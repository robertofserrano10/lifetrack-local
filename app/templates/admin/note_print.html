<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Progress Note</title>

<style>

@page{
    size: Letter;
    margin: 0.75in;
}

body{
    margin:0;
    padding:0;
    background:white;
}

/* DOCUMENTO */

.page{

    width:7.5in;
    margin:auto;

    font-family:"Courier New", Courier, monospace;
    font-size:11.5pt;
    line-height:1.25;

}

/* TITULO */

.title{

    font-size:18pt;
    margin-bottom:16px;

}

/* TEXTO */

.note{

    white-space:pre-wrap;
    word-break:break-word;

}

/* REGLAS DE IMPRESIÓN */

@media print{

    body{
        margin:0;
    }

    .page{
        page-break-inside:avoid;
    }

}

</style>

</head>

<body>

<div class="page">

<div class="title">
Progress Note
</div>

<div class="note">
{{ note.note_text }}
</div>

</div>

<script>
window.onload = function(){
    window.print();
}
</script>

</body>
</html>
