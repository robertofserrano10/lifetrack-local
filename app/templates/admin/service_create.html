{% extends "layouts/admin_base.html" %}

{% block content %}

<h1>Create Service</h1>

<p>
Patient: {{ claim.first_name }} {{ claim.last_name }}
</p>

<p>
Claim: {{ claim.claim_number }}
</p>

<form method="POST">

<label>Date of Service</label><br>
<input type="date" name="service_date" required>
<br><br>

<label>CPT Code</label><br>
<input type="text" name="cpt_code" required>
<br><br>

<label>Units</label><br>
<input type="number" name="units" value="1">
<br><br>

<label>Charge Amount</label><br>
<input type="number" step="0.01" name="charge_amount">
<br><br>

<button type="submit">
Create Service
</button>

</form>

<br>

<a href="/admin/patients/{{ claim.patient_id }}">
Back to Patient
</a>

{% endblock %}
