{% extends "layouts/admin_base.html" %}

{% block content %}

<h1>Progress Notes</h1>

<a href="/admin/notes/create/{{ encounter_id }}">
Create Note
</a>

<br><br>

<table>

<thead>
<tr>
<th>Created</th>
<th>Status</th>
<th>Signed</th>
<th>Print</th>
</tr>
</thead>

<tbody>

{% for n in notes %}

<tr>
<td>{{ n.created_at }}</td>
<td>{{ n.status }}</td>
<td>{{ n.signed }}</td>
<td>
<a href="/admin/notes/print/{{ n.id }}">
Print
</a>
</td>
</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
