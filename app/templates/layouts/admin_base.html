<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>

<meta charset="UTF-8">

<title>LifeTrack Admin</title>

<link rel="stylesheet" href="/static/css/admin_layout.css">

<script src="/static/js/theme_toggle.js" defer></script>

</head>

<body>

<div class="admin-container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="sidebar-logo">
            LifeTrack
        </div>

        <nav class="sidebar-nav">

            <a href="/admin/dashboard">Dashboard</a>

            <a href="/admin/patients">Patients</a>

            <a href="/admin/services">Services</a>

            <a href="/admin/claims">Claims</a>

            <a href="/admin/snapshots">Snapshots</a>

            <a href="/admin/finances">Finances</a>

            <a href="/admin/events">Event Ledger</a>

            <a href="/admin/reports">Reports</a>

            <a href="/admin/settings">Settings</a>

        </nav>

    </aside>


    <!-- MAIN AREA -->
    <div class="main-area">

        <!-- HEADER -->
        <header class="admin-header">

            <div class="header-left">
                LifeTrack Clearinghouse
            </div>

            <div class="header-right">

                <button id="theme-toggle">
                    Toggle Theme
                </button>

            </div>

        </header>


        <!-- CONTENT -->
        <main class="admin-content">

            {% block content %}
            {% endblock %}

        </main>

    </div>

</div>

</body>

</html>
